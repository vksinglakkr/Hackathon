<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Support Desks</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="container">
    <div class="lang-toggle">
      <button type="button" class="lang-btn active" data-lang="en">English Input</button>
      <button type="button" class="lang-btn" data-lang="hi">हिंदी इनपुट</button>
    </div>

    <h2>Smart Helpdesk Support Center</h2>
    <p class="subtitle">Search pre-existing solutions database matrices or generate an instant administrative SLA dispatch ticket</p>

    <form id="supportForm">
      <div class="form-group">
        <label>Your Name</label>
        <input type="text" id="ticketName" placeholder="Enter your full name" required>
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="ticketEmail" placeholder="name@domain.com" required>
      </div>

      <div class="form-group">
        <label>Mobile Number</label>
        <input type="tel" id="ticketPhone" placeholder="919876543210" required>
      </div>

      <div class="form-group">
        <label>Describe Your Query / Issue</label>
        <div class="search-wrapper">
          <input type="text" id="supportQuery" autocomplete="off" placeholder="Type or use microphone your query here..." required>
          <button type="button" class="mic-btn" id="micBtn" title="Toggle Voice Interaction Input Mode">🎙️</button>
          <div class="autocomplete-box" id="autocompleteBox"></div>
        </div>
      </div>

      <button type="submit">Submit Support Inquiry Ticket</button>
    </form>

    <div class="footer-timestamp">
      System Last Updated Tracker: <span class="stamp-time"></span>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
